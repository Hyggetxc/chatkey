name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      DEVELOPER_ID_CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}
      DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      NOTARY_KEYCHAIN_PROFILE: chatkey-notary

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure code signing keychain
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/chatkey-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          echo "$DEVELOPER_ID_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id-certificate.p12"
          security import "$RUNNER_TEMP/developer-id-certificate.p12" -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "Unable to find a Developer ID Application signing identity." >&2
            exit 1
          fi

          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Store notarization credentials
        run: |
          xcrun notarytool store-credentials "$NOTARY_KEYCHAIN_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Derive release metadata
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_ZIP=dist/ChatKey-${GITHUB_REF_NAME}.zip" >> "$GITHUB_ENV"
          echo "NOTARIZATION_ZIP=dist/ChatKey-${GITHUB_REF_NAME}-notarization.zip" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: APP_VERSION="$APP_VERSION" BUILD_NUMBER="${GITHUB_RUN_NUMBER}" BUNDLE_ID="com.hyggetxc.chatkey" CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" ./scripts/build-local-app.sh

      - name: Notarize app bundle
        run: |
          ditto -c -k --keepParent "dist/ChatKey.app" "$NOTARIZATION_ZIP"
          xcrun notarytool submit "$NOTARIZATION_ZIP" --keychain-profile "$NOTARY_KEYCHAIN_PROFILE" --wait
          xcrun stapler staple "dist/ChatKey.app"
          xcrun stapler validate "dist/ChatKey.app"
          spctl --assess --type execute --verbose=4 "dist/ChatKey.app"

      - name: Package release archive
        run: |
          ditto -c -k --keepParent "dist/ChatKey.app" "$RELEASE_ZIP"
          shasum -a 256 "$RELEASE_ZIP" > "$RELEASE_ZIP.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ChatKey ${{ github.ref_name }}
          files: |
            ${{ env.RELEASE_ZIP }}
            ${{ env.RELEASE_ZIP }}.sha256
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
